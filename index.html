<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mémory · Tables de multiplication</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0F0F1A;
    --card-back: #1E1E3A;
    --card-front: #16163A;
    --accent: #7C3AED;
    --accent-glow: #7C3AED44;
    --gold: #F59E0B;
    --text: #E2E8F0;
    --text-muted: #94A3B8;
    --success: #10B981;
    --border: #2D2D5A;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 1.5rem 1rem 3rem;
    background-image: radial-gradient(ellipse 60% 40% at 50% 0%, #7C3AED18 0%, transparent 70%);
  }

  header { text-align: center; margin-bottom: 1.2rem; }

  h1 {
    font-family: 'Space Grotesk', sans-serif;
    font-size: clamp(1.8rem, 5vw, 2.8rem);
    font-weight: 700;
    letter-spacing: -0.03em;
    background: linear-gradient(135deg, #E2E8F0 30%, #7C3AED);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .subtitle {
    color: var(--text-muted);
    font-size: 0.85rem;
    margin-top: 0.3rem;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }

  /* Table selector */
  .table-selector {
    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem;
    justify-content: center;
    margin-bottom: 1.2rem;
    max-width: 640px;
  }

  .table-btn {
    width: 48px;
    height: 48px;
    border-radius: 10px;
    border: 1.5px solid var(--border);
    background: #1a1a30;
    color: var(--text-muted);
    font-family: 'Space Grotesk', sans-serif;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.18s;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .table-btn:hover { border-color: var(--accent); color: var(--text); }

  .table-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: white;
    box-shadow: 0 0 16px var(--accent-glow);
  }

  /* Stats */
  .stats {
    display: flex;
    gap: 1.5rem;
    margin-bottom: 1.4rem;
    background: #1a1a30;
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 0.75rem 1.5rem;
  }

  .stat { text-align: center; }

  .stat-value {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 1.4rem;
    font-weight: 700;
    color: var(--gold);
    line-height: 1;
  }

  .stat-label {
    font-size: 0.68rem;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-top: 0.2rem;
  }

  /* Grid */
  .grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 0.65rem;
    max-width: 560px;
    width: 100%;
  }

  .card-wrapper {
    aspect-ratio: 1;
    perspective: 800px;
    cursor: pointer;
  }

  .card {
    width: 100%;
    height: 100%;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.45s cubic-bezier(0.4, 0, 0.2, 1);
    border-radius: 10px;
  }

  .card.flipped { transform: rotateY(180deg); }
  .card.matched { transform: rotateY(180deg); }

  .card-face {
    position: absolute;
    inset: 0;
    border-radius: 10px;
    backface-visibility: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .card-back {
    background: var(--card-back);
    border: 1px solid var(--border);
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  .card-wrapper:hover .card:not(.flipped):not(.matched) .card-back {
    border-color: var(--accent);
    box-shadow: 0 0 14px var(--accent-glow);
  }

  .card-back::before {
    content: '';
    position: absolute;
    inset: 6px;
    border: 1px solid #7C3AED33;
    border-radius: 6px;
  }

  .card-back::after {
    content: '✦';
    font-size: 1.1rem;
    color: #7C3AED55;
  }

  .card-front {
    background: var(--card-front);
    border: 1.5px solid var(--accent);
    transform: rotateY(180deg);
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 600;
    box-shadow: 0 0 16px var(--accent-glow);
    text-align: center;
    padding: 4px;
    line-height: 1.2;
    flex-direction: column;
  }

  .card-front.operation {
    color: #A78BFA;
    font-size: clamp(0.65rem, 1.8vw, 0.9rem);
  }

  .card-front.result {
    color: var(--gold);
    font-size: clamp(0.9rem, 2.5vw, 1.2rem);
  }

  .card.matched .card-front {
    border-color: var(--success);
    box-shadow: 0 0 16px #10B98133;
    background: #0d2420;
  }

  .card.shake { animation: shake 0.35s ease; }

  @keyframes shake {
    0%, 100% { transform: rotateY(180deg) translateX(0); }
    25% { transform: rotateY(180deg) translateX(-5px); }
    75% { transform: rotateY(180deg) translateX(5px); }
  }

  .actions {
    display: flex;
    gap: 0.8rem;
    margin-top: 1.4rem;
    flex-wrap: wrap;
    justify-content: center;
  }

  .btn {
    padding: 0.65rem 1.6rem;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 10px;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 0.9rem;
    font-weight: 600;
    cursor: pointer;
    letter-spacing: 0.02em;
    transition: background 0.2s, transform 0.1s, box-shadow 0.2s;
    box-shadow: 0 4px 18px var(--accent-glow);
  }

  .btn:hover { background: #6D28D9; box-shadow: 0 6px 24px #7C3AED66; }
  .btn:active { transform: scale(0.97); }

  .btn.secondary {
    background: transparent;
    border: 1.5px solid var(--border);
    color: var(--text-muted);
    box-shadow: none;
  }
  .btn.secondary:hover { border-color: var(--accent); color: var(--text); box-shadow: none; }

  /* Win banner */
  .win-banner {
    display: none;
    position: fixed;
    inset: 0;
    background: #0F0F1Acc;
    backdrop-filter: blur(6px);
    align-items: center;
    justify-content: center;
    z-index: 100;
  }

  .win-banner.visible { display: flex; }

  .win-box {
    background: #1a1a30;
    border: 1px solid var(--accent);
    border-radius: 20px;
    padding: 2rem 2.5rem;
    text-align: center;
    box-shadow: 0 0 60px var(--accent-glow);
    max-width: 320px;
    width: 90%;
  }

  .win-emoji { font-size: 2.8rem; }

  .win-title {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 1.8rem;
    font-weight: 700;
    margin: 0.4rem 0;
    background: linear-gradient(135deg, var(--gold), var(--accent));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .win-sub { color: var(--text-muted); font-size: 0.9rem; margin-bottom: 1rem; }

  .win-next {
    font-size: 0.8rem;
    color: var(--text-muted);
    margin-top: 0.6rem;
    cursor: pointer;
    text-decoration: underline;
  }

  .win-next:hover { color: var(--text); }

  @media (prefers-reduced-motion: reduce) {
    .card { transition: none; }
    .card.shake { animation: none; }
  }
</style>
</head>
<body>

<header>
  <h1>Mémory ×</h1>
  <p class="subtitle">Associe l'opération à son résultat</p>
</header>

<div class="table-selector" id="tableSelector"></div>

<div class="stats">
  <div class="stat">
    <div class="stat-value" id="moves">0</div>
    <div class="stat-label">Coups</div>
  </div>
  <div class="stat">
    <div class="stat-value" id="pairs">0</div>
    <div class="stat-label">Paires</div>
  </div>
  <div class="stat">
    <div class="stat-value" id="timer">0s</div>
    <div class="stat-label">Temps</div>
  </div>
</div>

<div class="grid" id="grid"></div>

<div class="actions">
  <button class="btn" onclick="initGame()">↺ Recommencer</button>
  <button class="btn secondary" onclick="nextTable()">Table suivante →</button>
</div>

<div class="win-banner" id="winBanner">
  <div class="win-box">
    <div class="win-emoji">🏆</div>
    <div class="win-title">Bravo !</div>
    <div class="win-sub" id="winSub"></div>
    <button class="btn" onclick="closeWin(false)">Rejouer</button>
    <div class="win-next" onclick="closeWin(true)">Table suivante →</div>
  </div>
</div>

<script>
  let currentTable = 1;
  let cards = [], flipped = [], matched = 0, moves = 0, lock = false;
  let seconds = 0, timerInterval = null, started = false;

  // Build table selector buttons
  const selector = document.getElementById('tableSelector');
  for (let t = 1; t <= 10; t++) {
    const btn = document.createElement('button');
    btn.className = 'table-btn' + (t === 1 ? ' active' : '');
    btn.textContent = '×' + t;
    btn.dataset.table = t;
    btn.onclick = () => selectTable(t);
    selector.appendChild(btn);
  }

  function selectTable(t) {
    currentTable = t;
    document.querySelectorAll('.table-btn').forEach(b => {
      b.classList.toggle('active', parseInt(b.dataset.table) === t);
    });
    initGame();
  }

  function nextTable() {
    const next = currentTable < 10 ? currentTable + 1 : 1;
    selectTable(next);
  }

  function shuffle(arr) {
    return [...arr].sort(() => Math.random() - 0.5);
  }

  function initGame() {
    clearInterval(timerInterval);
    seconds = 0; moves = 0; matched = 0; started = false;
    flipped = []; lock = false;
    document.getElementById('moves').textContent = '0';
    document.getElementById('pairs').textContent = '0';
    document.getElementById('timer').textContent = '0s';
    document.getElementById('winBanner').classList.remove('visible');

    const t = currentTable;
    const PAIRS = Array.from({length: 10}, (_, i) => {
      const n = i + 1;
      return { id: `${t}x${n}`, operation: `${t} × ${n}`, result: `${t * n}` };
    });

    const deck = shuffle([
      ...PAIRS.map(p => ({ pairId: p.id, label: p.operation, type: 'operation' })),
      ...PAIRS.map(p => ({ pairId: p.id, label: p.result, type: 'result' }))
    ]);

    const grid = document.getElementById('grid');
    grid.innerHTML = '';
    cards = [];

    deck.forEach((item, i) => {
      const wrapper = document.createElement('div');
      wrapper.className = 'card-wrapper';

      const card = document.createElement('div');
      card.className = 'card';
      card.dataset.pairId = item.pairId;

      card.innerHTML = `
        <div class="card-face card-back"></div>
        <div class="card-face card-front ${item.type}">${item.label}</div>
      `;

      card.addEventListener('click', () => onCardClick(card));
      wrapper.appendChild(card);
      grid.appendChild(wrapper);
      cards.push(card);
    });
  }

  function startTimer() {
    timerInterval = setInterval(() => {
      seconds++;
      document.getElementById('timer').textContent = seconds + 's';
    }, 1000);
  }

  function onCardClick(card) {
    if (lock) return;
    if (card.classList.contains('flipped') || card.classList.contains('matched')) return;

    if (!started) { started = true; startTimer(); }

    card.classList.add('flipped');
    flipped.push(card);

    if (flipped.length === 2) {
      moves++;
      document.getElementById('moves').textContent = moves;
      lock = true;

      const [a, b] = flipped;
      if (a.dataset.pairId === b.dataset.pairId && a !== b) {
        setTimeout(() => {
          a.classList.add('matched');
          b.classList.add('matched');
          a.classList.remove('flipped');
          b.classList.remove('flipped');
          flipped = [];
          lock = false;
          matched++;
          document.getElementById('pairs').textContent = matched;
          if (matched === 10) endGame();
        }, 400);
      } else {
        setTimeout(() => {
          a.classList.add('shake');
          b.classList.add('shake');
          setTimeout(() => {
            a.classList.remove('flipped', 'shake');
            b.classList.remove('flipped', 'shake');
            flipped = [];
            lock = false;
          }, 350);
        }, 600);
      }
    }
  }

  function endGame() {
    clearInterval(timerInterval);
    const next = currentTable < 10 ? `Table des ${currentTable + 1} ensuite ?` : 'Tu les connais toutes !';
    document.getElementById('winSub').textContent = `${moves} coups · ${seconds}s — ${next}`;
    setTimeout(() => document.getElementById('winBanner').classList.add('visible'), 300);
  }

  function closeWin(goNext) {
    document.getElementById('winBanner').classList.remove('visible');
    if (goNext) nextTable();
    else initGame();
  }

  initGame();
</script>
</body>
</html>
